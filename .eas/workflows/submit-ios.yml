name: Submit iOS Only

# Manual trigger only - use to submit an existing build
on:
  workflow_dispatch:
    inputs:
      build_id:
        type: string
        required: true
        description: 'Build ID to submit (from a previous build)'
      profile:
        type: choice
        options:
          - production
        required: false
        default: 'production'
        description: 'Submit profile'

jobs:
  submit_ios:
    name: 📱 Submit to App Store (TestFlight)
    type: submit
    params:
      build_id: ${{ inputs.build_id }}
      profile: ${{ inputs.profile || 'production' }}

  confirmation:
    name: 📋 Submission Confirmation
    needs: [submit_ios]
    type: doc
    params:
      md: |
        # ✅ iOS Submission Complete

        ## Submission Details
        - **Build ID**: `${{ inputs.build_id }}`
        - **Apple App ID**: ${{ needs.submit_ios.outputs.apple_app_id || 'N/A' }}
        - **Bundle ID**: ${{ needs.submit_ios.outputs.ios_bundle_identifier || 'N/A' }}

        ---

        ## Next Steps
        1. Go to [App Store Connect](https://appstoreconnect.apple.com)
        2. Navigate to your app → **TestFlight**
        3. Wait for processing to complete
        4. Test the build via TestFlight
        5. When ready, submit for App Review
